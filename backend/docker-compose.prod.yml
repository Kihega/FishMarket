# ── PRODUCTION ONLY ──────────────────────────────────────────
# Database is hosted on PlanetScale – not in this compose file
# ─────────────────────────────────────────────────────────────
version: "3.9"
services:
  app:
    build: .
    ports:
      - "80:80"
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
# No db service here – use PlanetScale connection string in .env
