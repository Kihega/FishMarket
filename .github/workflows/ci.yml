name: SmartFish CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests (run in cloud – Kali has no PHP/MySQL) ─────────────
  backend-test:
    name: Backend – PHPUnit on GitHub Actions
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: smartfish_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy env + generate key
        working-directory: backend
        run: |
          cp .env.testing .env
          php artisan key:generate

      - name: Run migrations
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: smartfish_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: smartfish_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan test --parallel

  # ── Frontend build (can also run locally) ────────────────────────────
  frontend-build:
    name: Frontend – Vite Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

  # ── Docker build check (prod image) ──────────────────────────────────
  docker-build-check:
    name: Backend – Docker image builds
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t smartfish-backend ./backend
