name: One-Time Admin Bootstrap

# Manually triggered only — never runs on push/PR.
# DELETE THIS FILE after using it once.
on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Email for the first admin account'
        required: true
      admin_password:
        description: 'Password for the first admin account (min 8 chars)'
        required: true

jobs:
  create-first-admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, zip

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Write production .env pointing at Aiven
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.AIVEN_DATABASE_URL }}
        run: |
          cat > .env << EOF
          APP_NAME=SmartFish
          APP_ENV=production
          APP_KEY=
          APP_DEBUG=false
          DATABASE_URL=${DATABASE_URL}
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=cookie
          CACHE_STORE=database
          EOF
          php artisan key:generate --force

      - name: Write Aiven SSL cert
        working-directory: backend
        env:
          AIVEN_SSL_CA: ${{ secrets.AIVEN_SSL_CA }}
        run: |
          mkdir -p docker
          echo "$AIVEN_SSL_CA" > docker/aiven-ca.pem
          echo "MYSQL_ATTR_SSL_CA=$(pwd)/docker/aiven-ca.pem" >> .env

      - name: Run the bootstrap command
        working-directory: backend
        run: |
          php artisan admin:create-first \
            "${{ github.event.inputs.admin_email }}" \
            "${{ github.event.inputs.admin_password }}"
